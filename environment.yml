name: atlas
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip

  # PyTorch with CUDA (cuda-version pins the CUDA variant on conda-forge)
  - pytorch>=2.5
  - torchvision
  - torchaudio
  - cuda-version=12.9

  # Scientific computing
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - pandas>=2.0

  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13

  # Utilities
  - pillow
  - requests
  - tqdm

  - pip:
      # CLIP and vision models
      - open-clip-torch>=2.20
      - timm>=0.9

      # Hugging Face ecosystem
      - transformers>=4.30
      - diffusers>=0.25
      - huggingface-hub>=0.16
      - safetensors>=0.3

      # Text processing
      - ftfy
      - regex
      - sentencepiece

      # Serialization / config
      - pyyaml>=6.0.1
      - protobuf>=3.20,<5
      - openai